{% extends "base/base.html" %}
{% block body %}

<div class="container mt-5" >
    <table class="table table-striped table-hover">
        <thead>
            <tr>
                <th>Sl</th>
                <th>Product Name</th>
                <th>Category</th>
                <th>Product Price</th>
                <th>Order By</th>
                <th>Order Status</th>
            </tr>
        </thead>
        <tbody>
            {% for i in orderData %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ i.product.name }}</td>
                <td>{{ i.product.category.name }}</td>
                <td>{{ i.total }}</td>
                <td>{{ i.user.username }}</td>
                <td><span>{{ i.status }}</span></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock body %}
