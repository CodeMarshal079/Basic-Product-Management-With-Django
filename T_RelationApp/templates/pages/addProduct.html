{% extends "base/base.html" %}

{% block body %}
<div class="container mb-3" style="max-width: 500px;">
<h1>Add Product</h1>
<form action="" method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div>
        <label class="label-form">Select Product Category</label>
        <select name="category" class="form-control" required>
            <option value="" disabled selected>Select Category</option>
            {% for i in catdata %}
            <option value="{{i.id}}">{{i.name}}</option> 
            {% endfor %}
        </select>
    </div>
    <label for="">Product Name</label>
    <input type="text" name="p_name" class="form-control">
    <label for="">Product Price</label>
    <input type="number" name="p_price" class="form-control">
    <label for="">Product Description</label>
    <input type="text" name="p_description" class="form-control">
    <label for="">Product Image</label>
    <input type="file" name="p_image" class="form-control"> <br>

    <input type="submit" value="Add Product" class="btn btn-success">
</form>
</div>
{% endblock body %}
